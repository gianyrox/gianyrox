<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1500" height="500" viewBox="0 0 1500 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b2f37"/>
      <stop offset="48%" stop-color="#264653"/>
      <stop offset="100%" stop-color="#11242b"/>
    </linearGradient>
    <radialGradient id="glow" cx="32%" cy="48%" r="55%">
      <stop offset="0%" stop-color="#2a9d8f" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#2a9d8f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coral" cx="88%" cy="22%" r="40%">
      <stop offset="0%" stop-color="#e76f51" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#e76f51" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="22" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1500" height="500" fill="url(#bg)"/>
  <rect width="1500" height="500" fill="url(#glow)"/>
  <rect width="1500" height="500" fill="url(#coral)"/>

  <!-- faint Euler's-formula motif (polymath signature) -->
  <text x="1190" y="432" font-family="Georgia, 'DejaVu Serif', serif" font-style="italic"
        font-size="60" fill="#ffffff" fill-opacity="0.06" text-anchor="middle">e^(ix) = cos x + i sin x</text>

  <!-- brand mark -->
  <image xlink:href="file:///home/gian/agfarms/gianyrox/public/brand/logo.png"
         x="140" y="106" width="288" height="288" filter="url(#soft)"/>

  <!-- wordmark -->
  <text x="486" y="248" font-family="'DejaVu Sans', Inter, Arial, sans-serif" font-weight="800"
        font-size="104" letter-spacing="6" fill="#ffffff">GIANYROX</text>
  <!-- coral accent underline -->
  <rect x="490" y="272" width="300" height="6" rx="3" fill="#e76f51"/>

  <!-- handle -->
  <text x="490" y="330" font-family="'DejaVu Sans', Inter, Arial, sans-serif" font-weight="600"
        font-size="40" letter-spacing="2" fill="#2a9d8f">@gianyrox</text>

  <!-- role line -->
  <text x="490" y="382" font-family="'DejaVu Sans', Inter, Arial, sans-serif" font-weight="400"
        font-size="29" fill="#cfd8dc">Mathematician &#183; Data Scientist &#183; Author &#8212; builds production AI</text>

  <!-- tagline -->
  <text x="490" y="424" font-family="'DejaVu Sans', Inter, Arial, sans-serif" font-style="italic"
        font-weight="500" font-size="24" fill="#e9b8ac">Gianyrox Everywhere.</text>

  <!-- thin frame -->
  <rect x="6" y="6" width="1488" height="488" rx="14" fill="none" stroke="#2a9d8f" stroke-opacity="0.25" stroke-width="2"/>
</svg>
